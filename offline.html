<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atler — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0e0e0e;
      color: #e5e2e1;
      font-family: -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 24px;
      text-align: center;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 900;
      color: #c0c1ff;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 8px;
    }
    h1 { font-size: 1.2rem; font-weight: 700; }
    p { font-size: 0.875rem; color: #c7c4d8; line-height: 1.6; max-width: 280px; }
    button {
      margin-top: 8px;
      padding: 12px 28px;
      background: #c0c1ff;
      color: #000;
      border: none;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="logo">ATŁER</div>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>Open Atler when you're connected to the internet and your data will load automatically.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
